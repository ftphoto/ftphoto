<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>hannah holzer – work</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #fff;
    color: #111;
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 13px;
  }

  /* NAV */
  nav {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 1.6rem 2rem;
    border-bottom: 1px solid #e8e8e8;
  }
  .nav-name {
    font-size: 13px;
    font-weight: 400;
    text-decoration: none;
    color: #111;
    letter-spacing: 0.01em;
  }
  .nav-links {
    display: flex;
    gap: 2rem;
    list-style: none;
  }
  .nav-links a {
    font-size: 12px;
    color: #111;
    text-decoration: none;
    letter-spacing: 0.03em;
    transition: opacity 0.2s;
  }
  .nav-links a:hover { opacity: 0.5; }
  .nav-links a.active { border-bottom: 1px solid #111; }

  /* GALLERY */
  .gallery {
    max-width: 1100px;
    margin: 0 auto;
    padding: 3rem 2rem 5rem;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.8rem;
  }

  .photo-item {
    cursor: pointer;
    display: flex;
    flex-direction: column;
  }
  .photo-item img {
    width: 100%;
    height: auto;
    display: block;
    transition: opacity 0.25s;
  }
  .photo-item:hover img { opacity: 0.88; }

  .photo-caption {
    font-size: 11px;
    color: #888;
    margin-top: 0.35rem;
    letter-spacing: 0.04em;
    font-style: italic;
    padding-bottom: 0.4rem;
  }

  /* LIGHTBOX */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.96);
    z-index: 1000;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .lightbox.open { display: flex; }

  .lightbox-inner {
    position: relative;
    max-width: min(90vw, 1000px);
    max-height: 85vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .lightbox-inner img {
    max-width: 100%;
    max-height: 82vh;
    object-fit: contain;
    display: block;
  }
  .lightbox-location {
    margin-top: 0.9rem;
    font-size: 12px;
    color: #888;
    font-style: italic;
    letter-spacing: 0.05em;
    text-align: center;
    min-height: 1.2em;
  }
  .lightbox-close {
    position: fixed;
    top: 1.4rem;
    right: 1.8rem;
    background: none;
    border: none;
    font-size: 22px;
    cursor: pointer;
    color: #111;
    line-height: 1;
    opacity: 0.5;
    transition: opacity 0.2s;
    font-weight: 300;
  }
  .lightbox-close:hover { opacity: 1; }

  .lightbox-nav {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    font-size: 22px;
    cursor: pointer;
    color: #111;
    opacity: 0.35;
    transition: opacity 0.2s;
    padding: 1rem;
    font-weight: 300;
  }
  .lightbox-nav:hover { opacity: 0.9; }
  .lightbox-prev { left: 1rem; }
  .lightbox-next { right: 1rem; }

  /* FOOTER */
  footer {
    border-top: 1px solid #e8e8e8;
    padding: 1.4rem 2rem;
    display: flex;
    gap: 1.5rem;
    font-size: 11px;
    color: #888;
  }
  footer a { color: #888; text-decoration: none; transition: color 0.2s; }
  footer a:hover { color: #111; }

  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<nav>
  <a class="nav-name" href="#">hannah holzer</a>
  <ul class="nav-links">
    <li><a href="#">home</a></li>
    <li><a href="#" class="active">work</a></li>
    <li><a href="#">about me</a></li>
  </ul>
</nav>

<main class="gallery" id="gallery">
    <div class="grid">
          <div class="photo-item" data-location="Bondi Beach">
            <img src="images/australia_1.jpg" alt="PR8 Madeira, Portugal 2026" loading="lazy">
            <div class="photo-caption">North Bondi Beach, Sydney</div>
          </div>
    <div class="photo-item" data-location="Great Ocean Road, Australia">
      <img src="images/australia_2.jpg" alt="PR8 Madeira, Portugal 2026" loading="lazy">
      <div class="photo-caption">12 Apostles</div>
    </div>
    <div class="photo-item" data-location="Great Ocean Road, Australia">
      <img src="images/australia_3.jpg" alt="tbd" loading="lazy">
      <div class="photo-caption">12 Apostles</div>
    </div>

    <div class="photo-item" data-location="Howth, Ireland">
      <img src="images/ireland_3.jpg" alt="tbd" loading="lazy">
      <div class="photo-caption">Howth Head</div>
    </div>
    <div class="photo-item" data-location="Madeira, Portugal">
      <img src="images/portugal_1.jpg" alt="PR8 Madeira, Portugal 2026" loading="lazy">
      <div class="photo-caption">Madeira, Portugal</div>
    </div>

    <div class="photo-item" data-location="Madeira, Portugal">
      <img src="images/portugal_2.jpg" alt="PR8 Madeira, Portugal 2026" loading="lazy">
      <div class="photo-caption">Madeira, Portugal</div>
    </div>

    <div class="photo-item" data-location="Cannon Beach, Oregon">
      <img src="images/usa_1.jpg" alt="Misty day in Cannon Beach, Oregon" loading="lazy">
      <div class="photo-caption">Cannon Beach, Oregon</div>
    </div>

    <div class="photo-item" data-location="Causeway Coast, Northern Ireland">
      <img src="images/ireland_1.jpg" alt="Sheep grazing in a pasture" loading="lazy">
      <div class="photo-caption">Causeway Coast, Northern Ireland</div>
    </div>

    <div class="photo-item" data-location="Howth, Ireland">
      <img src="images/ireland_2.jpg" alt="Sheep grazing in a pasture" loading="lazy">
      <div class="photo-caption">Howth, Ireland</div>
    </div>

  </div>
</main>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer">
  <button class="lightbox-close" id="lb-close" aria-label="Close">&#x2715;</button>
  <button class="lightbox-nav lightbox-prev" id="lb-prev" aria-label="Previous">&#8592;</button>
  <button class="lightbox-nav lightbox-next" id="lb-next" aria-label="Next">&#8594;</button>
  <div class="lightbox-inner">
    <img id="lb-img" src="" alt="">
    <div class="lightbox-location" id="lb-location"></div>
  </div>
</div>

<footer>
  <a href="mailto:hello@yourname.com">mail</a>
  <a href="#">instagram</a>
  <a href="#">flickr</a>
</footer>

<script>
  const items = Array.from(document.querySelectorAll('.photo-item'));
  const lb = document.getElementById('lightbox');
  const lbImg = document.getElementById('lb-img');
  const lbLoc = document.getElementById('lb-location');
  let current = 0;

  function open(index) {
    current = index;
    const item = items[current];
    lbImg.src = item.querySelector('img').src;
    lbImg.alt = item.querySelector('img').alt;
    lbLoc.textContent = item.dataset.location || '';
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function close() {
    lb.classList.remove('open');
    document.body.style.overflow = '';
  }

  function prev() { open((current - 1 + items.length) % items.length); }
  function next() { open((current + 1) % items.length); }

  items.forEach((item, i) => item.addEventListener('click', () => open(i)));
  document.getElementById('lb-close').addEventListener('click', close);
  document.getElementById('lb-prev').addEventListener('click', prev);
  document.getElementById('lb-next').addEventListener('click', next);

  lb.addEventListener('click', e => { if (e.target === lb) close(); });

  document.addEventListener('keydown', e => {
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape') close();
    if (e.key === 'ArrowLeft') prev();
    if (e.key === 'ArrowRight') next();
  });
</script>
</body>
</html>
